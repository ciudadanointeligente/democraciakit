{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://unpkg.com/htmx.org@2.0.1" integrity="sha384-QWGpdj554B4ETpJJC9z+ZHJcA/i59TyjxEPXiiUgN2WmTyV5OEZWCD6gQhgkdpB/" crossorigin="anonymous"></script>
    <title>Abre Alcaldías DemocraciaKit</title>
</head>
<body>
    <div class="container">
        <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
          <div class="col-md-3 mb-2 mb-md-0">
            <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
              <svg class="bi" width="40" height="32" role="img" aria-label="Bootstrap"><use xlink:href="#bootstrap"/></svg>
            </a>
          </div>
    
          <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li>
              <a href="{% url 'contenidos:index' %}" class="nav-link px-2 link-secondary">Inicio</a>
            </li>
            <li>
              <a href="{% url 'contenidos:uno' %}" class="nav-link px-2 link-secondary">Uno</a>
            </li>
            <li>
              <a href="{% url 'contenidos:dos' %}" class="nav-link px-2 link-secondary">Dos</a>
            </li>
            <li>
              <a href="{% url 'contenidos:tres' %}" class="nav-link px-2 link-secondary">Tres</a>
            </li>
            <li>
              <a href="{% url 'contenidos:cuatro' %}" class="nav-link px-2 link-secondary">Cuatro</a>
            </li>
          </ul>
          <div class="col-md-3 text-end">
            {% if user.is_authenticated %}
            <p>Hola, {{ user.username }}</p>
            <button type="button" class="btn btn-outline-primary me-2"><a href="{% url 'users:user_login' %}">Ingresar</a></button>
            {% else %}
            <button href="{% url 'users:register' %}" type="button" class="btn btn-primary">Inscribirse</button>
            {% endif %}
          </div>
        </header>
    </div>
    <div class="container">
    {% block content %}
    {% endblock %}
    </div>
</body>
</html>
